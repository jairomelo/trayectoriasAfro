services:
  postgres:
    image: postgres:16-alpine
    container_name: trayectorias_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trayectorias}
      POSTGRES_USER: ${POSTGRES_USER:-trayectorias_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trayectorias_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trayectorias_network

  web:
    build:
      context: .
      dockerfile: ./mstdb_manager/Dockerfile
    container_name: trayectorias_web
    command: gunicorn mdb.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-trayectorias_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-trayectorias}
    volumes:
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - trayectorias_network

  frontend:
    build:
      context: ./mstdb_theme
      dockerfile: Dockerfile
    container_name: trayectorias_frontend
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trayectorias_network

volumes:
  postgres_data:
    driver: local
  media_volume:
    driver: local

networks:
  trayectorias_network:
    driver: bridge
